name: Deploy To Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - ARM64
      - mytimers-pi

    steps:
      - name: Pull latest code on Pi
        run: |
          cd /opt/mytimers
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Rebuild and restart container
        run: |
          cd /opt/mytimers
          sudo docker compose up -d --build

      - name: Health check
        run: |
          sleep 3
          for attempt in $(seq 1 15); do
            if curl -fsS -o /dev/null http://127.0.0.1:8082/; then
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed for http://127.0.0.1:8082/"
          exit 1
