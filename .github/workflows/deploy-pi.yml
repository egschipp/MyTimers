name: Deploy To Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - ARM64
      - mytimers-pi

    steps:
      - name: Pull latest code on Pi
        run: |
          cd /opt/mytimers
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Rebuild and restart container
        run: |
          cd /opt/mytimers
          sudo docker compose up -d --build

      - name: Health check
        run: |
          curl -fsS --retry 10 --retry-delay 3 http://127.0.0.1:8082/ > /dev/null
